<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>لعبة الجاسوس</title>
  <link href="https://fonts.googleapis.com/css2?family=Katibeh&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #fdfbf7; --stone-100: #f5f5f4; --stone-200: #e7e5e4;
      --stone-300: #d6d3d1; --stone-400: #a8a29e; --stone-500: #78716c;
      --stone-600: #57534e; --stone-700: #44403c; --stone-800: #292524;
      --rose: #be123c; --amber-light: #fef3c7;
      --green: #15803d; --green-light: #dcfce7; --red-light: #fff1f2;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--stone-200);
      background-image: radial-gradient(var(--stone-300) 1px, transparent 1px);
      background-size: 20px 20px;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 16px; -webkit-tap-highlight-color: transparent;
    }
    .font-katibeh { font-family: 'Katibeh', cursive; }
    .paper {
      background: var(--cream);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.2);
      border-radius: 4px; padding: 32px 28px; min-height: 600px;
      width: 100%; max-width: 480px; margin: 0 auto;
      position: relative; overflow: hidden; border: 1px solid var(--stone-200);
      display: flex; flex-direction: column; align-items: center;
    }
    .tape { position: absolute; top: 0; left: 50%; transform: translate(-50%, -50%) rotate(-2deg); width: 128px; height: 32px; background: rgba(253,230,138,0.5); }
    .screen { display: none; flex-direction: column; align-items: center; width: 100%; flex: 1; }
    .screen.active { display: flex; }
    .btn { font-family: 'Katibeh', cursive; font-size: 1.6rem; border: none; cursor: pointer; transition: all 0.2s; border-radius: 4px; padding: 10px 32px; display: inline-block; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--stone-800); color: var(--cream); }
    .btn-primary:hover { background: var(--rose); }
    .btn-secondary { background: transparent; color: var(--stone-400); font-size: 1.4rem; }
    .btn-secondary:hover { color: var(--rose); text-decoration: underline; }
    .screen-title { font-family: 'Katibeh', cursive; font-size: 2.2rem; color: var(--stone-700); margin-bottom: 20px; text-align: center; }
    .divider { width: 60px; height: 2px; background: var(--stone-200); margin: 12px auto; border-radius: 2px; }
    .name-input { width: 100%; border: 2px solid var(--stone-200); border-radius: 8px; padding: 12px 16px; font-family: 'Cairo', sans-serif; font-size: 1.1rem; color: var(--stone-800); background: var(--cream); transition: border-color 0.2s; outline: none; margin-bottom: 12px; text-align: center; }
    .name-input:focus { border-color: var(--stone-500); }
    .name-input::placeholder { color: var(--stone-400); }
    .lobby-code-box { background: var(--stone-800); color: var(--amber-light); font-family: 'Katibeh', cursive; font-size: 1rem; border-radius: 8px; padding: 12px 16px; margin: 8px 0 4px; text-align: center; word-break: break-all; width: 100%; line-height: 1.6; letter-spacing: 1px; }
    .copy-btn { font-size: 0.9rem; background: var(--stone-100); border: 1px solid var(--stone-300); color: var(--stone-600); padding: 6px 18px; border-radius: 20px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
    .copy-btn:hover { background: var(--stone-200); }
    .players-list { width: 100%; margin: 8px 0; max-height: 200px; overflow-y: auto; }
    .player-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 8px; margin-bottom: 6px; background: var(--stone-100); border: 1px solid var(--stone-200); animation: slideIn 0.3s ease-out; }
    .player-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .player-dot.host { background: var(--rose); }
    @keyframes slideIn { from{opacity:0;transform:translateX(10px);} to{opacity:1;transform:translateX(0);} }
    .categories-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 8px 0 16px; }
    .cat-btn { font-family: 'Katibeh', cursive; font-size: 1.5rem; padding: 14px 10px; border: 2px solid var(--stone-200); border-radius: 8px; background: var(--cream); color: var(--stone-700); cursor: pointer; transition: all 0.2s; text-align: center; }
    .cat-btn:hover { border-color: var(--stone-600); background: var(--stone-100); transform: translateY(-2px); }
    .waiting-animation { font-size: 3rem; animation: pulse 1.5s ease-in-out infinite; margin: 20px 0; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.1);opacity:0.7;} }
    .flip-container { width: 100%; perspective: 1000px; margin: 16px 0; }
    .flip-card { position: relative; width: 100%; min-height: 260px; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4,0.2,0.2,1); cursor: pointer; }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-face { position: absolute; width: 100%; height: 100%; min-height: 260px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .flip-front { background: var(--stone-800); color: var(--cream); }
    .flip-back { transform: rotateY(180deg); }
    .flip-back.spy-back { background: var(--rose); color: white; }
    .flip-back.normal-back { background: var(--stone-700); color: var(--cream); }
    .card-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .card-hint { font-family: 'Katibeh', cursive; font-size: 1.8rem; text-align: center; }
    .card-role-label { font-size: 0.9rem; opacity: 0.7; margin-bottom: 8px; }
    .card-role-name { font-family: 'Katibeh', cursive; font-size: 3rem; text-align: center; line-height: 1.1; }
    .card-spy-note { font-size: 0.9rem; opacity: 0.85; margin-top: 12px; text-align: center; line-height: 1.6; }
    .player-label { font-family: 'Katibeh', cursive; font-size: 1.6rem; color: var(--stone-500); margin-bottom: 4px; }
    .player-name-big { font-family: 'Katibeh', cursive; font-size: 2.8rem; color: var(--stone-800); margin-bottom: 4px; }
    .progress-dots { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; justify-content: center; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--stone-200); transition: background 0.3s; }
    .dot.done { background: var(--stone-500); }
    .dot.current { background: var(--stone-800); transform: scale(1.3); }
    .host-badge { font-size: 0.8rem; background: var(--rose); color: white; padding: 2px 10px; border-radius: 20px; margin-bottom: 12px; font-weight: 700; }
    .secret-reveal { background: var(--stone-800); border-radius: 12px; padding: 20px 28px; text-align: center; width: 100%; margin: 12px 0; }
    .secret-label { font-size: 0.85rem; color: var(--stone-400); letter-spacing: 2px; margin-bottom: 8px; }
    .secret-word { font-family: 'Katibeh', cursive; font-size: 3.2rem; color: var(--amber-light); }
    .roles-list { width: 100%; margin: 12px 0; }
    .role-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-radius: 8px; margin-bottom: 6px; animation: fadeIn 0.4s ease-out forwards; }
    .role-item.spy { background: var(--red-light); border: 1px solid #fecdd3; }
    .role-item.normal { background: var(--green-light); border: 1px solid #bbf7d0; }
    .role-name-left { font-weight: 700; font-size: 1rem; color: var(--stone-800); }
    .role-badge { font-family: 'Katibeh', cursive; font-size: 1.2rem; padding: 2px 12px; border-radius: 20px; }
    .spy .role-badge { background: #fda4af; color: var(--rose); }
    .normal .role-badge { background: #86efac; color: var(--green); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    .info-box { background: var(--stone-100); border-radius: 8px; padding: 12px 16px; width: 100%; margin-bottom: 12px; font-size: 0.95rem; color: var(--stone-600); text-align: center; line-height: 1.7; }
    .counter-row { display: flex; align-items: center; justify-content: space-between; width: 100%; background: var(--stone-100); border-radius: 8px; padding: 12px 20px; margin-bottom: 12px; }
    .counter-label { font-size: 1rem; color: var(--stone-600); font-weight: 600; }
    .counter-controls { display: flex; align-items: center; gap: 16px; }
    .counter-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--stone-300); background: var(--cream); font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--stone-700); }
    .counter-value { font-size: 1.4rem; font-weight: 700; color: var(--stone-800); min-width: 24px; text-align: center; }
    .error-msg { color: var(--rose); font-size: 0.9rem; margin-top: 4px; text-align: center; min-height: 20px; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-left: 8px; }
    @keyframes spin { to{transform:rotate(360deg);} }
  </style>
</head>
<body>
<div class="paper">
  <div class="tape"></div>

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div style="font-size:3.5rem;margin:36px 0 8px;">🕵️</div>
    <div class="font-katibeh" style="font-size:4.5rem;color:var(--stone-800);line-height:1;margin-bottom:8px;">الجاسوس</div>
    <div class="divider"></div>
    <p style="font-size:1rem;color:var(--stone-500);text-align:center;line-height:1.8;margin-bottom:32px;max-width:300px;">العب مع أصحابك — كل واحد على موبايله!</p>
    <button class="btn btn-primary" onclick="showCreate()" style="margin-bottom:12px;width:220px;">🎮 أنا الهوست</button>
    <button class="btn btn-primary" onclick="showJoin()" style="background:var(--stone-600);width:220px;">🔗 انضم للعبة</button>
  </div>

  <!-- CREATE -->
  <div id="screen-create" class="screen">
    <div class="screen-title">إعداد اللعبة</div>
    <input class="name-input" id="host-name" type="text" placeholder="اسمك إيه؟" maxlength="20" />
    <div class="counter-row">
      <span class="counter-label">عدد الجواسيس</span>
      <div class="counter-controls">
        <button class="counter-btn" onclick="changeSpies(-1)">−</button>
        <span class="counter-value" id="spies-val">1</span>
        <button class="counter-btn" onclick="changeSpies(1)">+</button>
      </div>
    </div>
    <div id="create-error" class="error-msg"></div>
    <button class="btn btn-primary" onclick="createGame()" style="margin-top:8px;" id="create-btn">ابعت الكود للأصحاب</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-home')">رجوع</button>
  </div>

  <!-- JOIN -->
  <div id="screen-join" class="screen">
    <div class="screen-title">انضم للعبة</div>
    <input class="name-input" id="join-name" type="text" placeholder="اسمك إيه؟" maxlength="20" />
    <input class="name-input" id="join-code" type="text" placeholder="الصق كود اللعبة هنا" style="font-size:0.85rem;" />
    <div id="join-error" class="error-msg"></div>
    <button class="btn btn-primary" onclick="joinGame()" id="join-btn">انضم</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-home')">رجوع</button>
  </div>

  <!-- LOBBY HOST -->
  <div id="screen-lobby" class="screen">
    <div class="host-badge">أنت الهوست</div>
    <div class="screen-title" style="margin-bottom:4px;">شارك الكود مع أصحابك</div>
    <div class="lobby-code-box" id="lobby-code-display">...</div>
    <button class="copy-btn" onclick="copyCode()">📋 انسخ الكود</button>
    <div class="players-list" id="lobby-players"></div>
    <button class="btn btn-primary" onclick="showCategories()" style="margin-top:8px;">ابدأ اللعبة ▶</button>
    <button class="btn btn-secondary" onclick="deleteGameAndGoHome()">إلغاء</button>
  </div>

  <!-- LOBBY GUEST -->
  <div id="screen-lobby-guest" class="screen">
    <div class="screen-title">في الانتظار...</div>
    <div class="waiting-animation">⏳</div>
    <div class="info-box">الهوست لسه مبدأش اللعبة 😄</div>
    <div class="players-list" id="lobby-players-guest"></div>
    <button class="btn btn-secondary" onclick="leaveAndGoHome()">اخرج</button>
  </div>

  <!-- CATEGORIES -->
  <div id="screen-categories" class="screen">
    <div class="screen-title">اختر الفئة</div>
    <div class="categories-grid" id="categories-grid"></div>
    <button class="btn btn-secondary" onclick="showScreen('screen-lobby')">رجوع</button>
  </div>

  <!-- WAITING TURN -->
  <div id="screen-waiting-turn" class="screen">
    <div class="player-name-big font-katibeh" id="waiting-my-name"></div>
    <div class="waiting-animation" id="waiting-icon">😴</div>
    <div class="info-box" id="waiting-msg">استنى دورك...</div>
    <div class="progress-dots" id="waiting-dots"></div>
    <button class="btn btn-secondary" onclick="leaveAndGoHome()">اخرج</button>
  </div>

  <!-- MY TURN -->
  <div id="screen-my-turn" class="screen">
    <div class="player-label font-katibeh">دورك!</div>
    <div class="player-name-big font-katibeh" id="myturn-name"></div>
    <div class="progress-dots" id="myturn-dots"></div>
    <div class="flip-container">
      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <div class="flip-face flip-front">
          <div class="card-icon">👁️</div>
          <div class="card-hint font-katibeh">اضغط لكشف دورك</div>
          <div style="font-size:0.85rem;color:#a8a29e;margin-top:8px">اتأكد إن محدش شايف غيرك</div>
        </div>
        <div class="flip-face flip-back" id="flip-back"></div>
      </div>
    </div>
    <button class="btn btn-primary" id="done-btn" onclick="iAmDone()" style="display:none;margin-top:8px;">خلاص شفت ✓</button>
  </div>

  <!-- HOST NEXT -->
  <div id="screen-host-next" class="screen">
    <div class="host-badge">أنت الهوست</div>
    <div class="waiting-animation">👥</div>
    <div class="info-box" id="host-next-msg"></div>
    <div class="progress-dots" id="host-dots"></div>
    <button class="btn btn-primary" onclick="hostNext()">التالي ←</button>
    <button class="btn btn-secondary" onclick="deleteGameAndGoHome()">إلغاء اللعبة</button>
  </div>

  <!-- END -->
  <div id="screen-end" class="screen">
    <div class="screen-title">📋 ملخص الدور</div>
    <div class="secret-reveal">
      <div class="secret-label">الكلمة السرية كانت</div>
      <div class="secret-word font-katibeh" id="end-secret"></div>
    </div>
    <div class="roles-list" id="end-roles"></div>
    <button class="btn btn-primary" onclick="playAgain()" style="margin-top:8px;">دور جديد 🎲</button>
    <button class="btn btn-secondary" onclick="goHome()">الرئيسية</button>
  </div>
</div>

<script>
const API_KEY = '$2a$10$vjqXrCK5iEeKZBTde6zDZOetQu6WEMxJxi.x/2pA4m9gMpYg2oODq';
const BASE_URL = 'https://api.jsonbin.io/v3/b';
const HEADERS = { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY };

const CATEGORIES = {
  "وظائف": ["محاسب","راقص باليه","طاهي","رائد فضاء","طبيب بيطري","مخرج أفلام","ساحر","محقق خاص","منقذ سباحة","قرصان","نجم روك","جاسوس","فنان تشكيلي","مزارع","مهندس معماري","مهرج","سائق سباق","عالم مجنون","نينجا","طيار","محامي","مدرس","صحفي","عامل إطفاء"],
  "وظائف غير رسمية": ["بائع خضار","سايس","بياع مناديل","ماسح أحذية","عامل دليفري","بائع في كشك","نقاش","سباك","كهربائي","نجار","بائع شاي","بائع غزل بنات","منجد","عامل بناء","بواب","سائق توكتوك","بائع فول","مكوجي","بائع عرقسوس","رقاصة","منجم","دجال"],
  "حيوانات": ["أسد","نمر","فهد","ذئب","ثعلب","دب","فيل","زرافة","وحيد القرن","كنغر","كوالا","باندا","قرد","غوريلا","شمبانزي","غزال","حمار وحشي","جمل","حصان","حمار","بقرة","جاموسة","خروف","ماعز","كلب","قطة","أرنب","سنجاب","قنفذ","صقر","نسر","بومة","غراب","هدهد","بغبغاء","نعامة","طاووس","بطة","ديك","بطريق","سمكة","قرش","حوت","دولفين","أخطبوط","قنديل البحر","سلطعون","تمساح","سحلية","ضفدعة","نحلة","دبانة","ناموسة","نملة","صرصار","عنكبوت","فراشة","جرادة"],
  "أماكن": ["مكتبة","مستشفى","شاطئ","سينما","متحف","مول","مطار","سيرك","محطة فضاء","غواصة","بنك","مطعم","موقع بناء","جامعة","حديقة حيوان","كازينو","سفينة","استوديو","حفل زفاف","قاعدة عسكرية"],
  "أكلات": ["بيتزا","برجر","سوشي","آيس كريم","تاكو","كعكة","سلطة","معكرونة","دونات","حساء","شاورما","كبسة","فلافل","كنافة","بيض مقلي","كشري","ملوخية","محشي","كباب"],
  "مشاهير مصريين": ["عادل إمام","أم كلثوم","أحمد زكي","عمر الشريف","فاتن حمامة","محمد صلاح","عمرو دياب","أحمد حلمي","كريم عبد العزيز","ياسمين عبد العزيز","منى زكي","محمد هنيدي","نجيب محفوظ","إسماعيل ياسين","تحية كاريوكا"],
  "أشياء سهلة": ["كرسي","سرير","كنبة","ترابيزة","دولاب","سجادة","ستارة","مخدة","بطانية","نجفة","مراية","مروحة سقف","ثلاجة","بوتجاز","غسالة","ميكروويف","خلاط","حلة","طبق","كوباية","شوكة","معلقة","سكينة","صينية","إزازة مية","صابونة","شامبو","معجون أسنان","فرشة أسنان","فوطة","مكنسة","مكواة","تليفزيون","موبايل","لابتوب","سماعة","راوتر","تكييف","شنطة","محفظة","نضارة","ساعة","قميص","بنطلون","جاكيت","جزمة","كوتشي","شراب","طرحة","شمسية","قلم رصاص","قلم جاف","كتاب","كشكول","مقص","آلة حاسبة","عربية","عجلة","موتوسيكل","توكتوك","أتوبيس","طيارة","مركب","شجرة","وردة","صبارة","تفاحة","موزة","بطيخة"],
  "متنوع": ["كرنفال","مكتب بريد","محطة قطار","محكمة","مهرجان","معرض فن","تخييم","القطب الشمالي","جزيرة مهجورة","غزو فضائي","يانصيب","انقطاع كهرباء","بيت مسكون","مسابقة أكل","عاصفة","حجر صحي","كنز مدفون","فيلم رعب","كافيه","شيشة","كوتشينة","بلايستيشن","فرح شعبي","خناقة","قسم شرطة","ميكروباص","قهوة بلدي","صالون حلاقة","حمام سباحة","رحلة مدرسية","عيد ميلاد","طابور عيش","ماتش كورة","فرح إسلامي","خيمة رمضانية","سوق الجمعة","مترو الأنفاق","كباريه","جامع","كنيسة"]
};

let myName='', myBinId=null, isHost=false;
let pollInterval=null, spyCount=1, cardFlipped=false, myPlayerIndex=-1;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){stopPolling();myBinId=null;myName='';isHost=false;myPlayerIndex=-1;showScreen('screen-home');}
function changeSpies(d){spyCount=Math.max(1,Math.min(5,spyCount+d));document.getElementById('spies-val').textContent=spyCount;}
function showCreate(){showScreen('screen-create');}
function showJoin(){showScreen('screen-join');}
function setBtn(id,loading){const b=document.getElementById(id);if(!b)return;if(loading){b.dataset.orig=b.innerHTML;b.innerHTML='جاري التحميل <span class="spinner"></span>';b.disabled=true;}else{b.innerHTML=b.dataset.orig||b.innerHTML;b.disabled=false;}}

// ===== API =====
async function createBin(data){
  const res=await fetch(BASE_URL,{method:'POST',headers:{...HEADERS,'X-Bin-Private':'false','X-Bin-Name':'spy-game'},body:JSON.stringify(data)});
  const json=await res.json();
  if(!json.metadata)throw new Error('API error');
  return json.metadata.id;
}
async function readBin(binId){
  const res=await fetch(`${BASE_URL}/${binId}/latest`,{headers:HEADERS});
  const json=await res.json();
  if(!json.record)throw new Error('not found');
  return json.record;
}
async function updateBin(binId,data){await fetch(`${BASE_URL}/${binId}`,{method:'PUT',headers:HEADERS,body:JSON.stringify(data)});}
async function deleteBin(binId){await fetch(`${BASE_URL}/${binId}`,{method:'DELETE',headers:HEADERS});}

// ===== COPY =====
function copyCode(){
  const code=document.getElementById('lobby-code-display').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✅ اتنسخ!';
    setTimeout(()=>btn.textContent='📋 انسخ الكود',2000);
  }).catch(()=>{
    // fallback for mobile
    const el=document.createElement('textarea');
    el.value=code; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    const btn=document.querySelector('.copy-btn');
    btn.textContent='✅ اتنسخ!';
    setTimeout(()=>btn.textContent='📋 انسخ الكود',2000);
  });
}

// ===== CREATE =====
async function createGame(){
  const name=document.getElementById('host-name').value.trim();
  if(!name){document.getElementById('create-error').textContent='اكتب اسمك';return;}
  myName=name;isHost=true;
  setBtn('create-btn',true);
  document.getElementById('create-error').textContent='';
  try{
    const gameData={status:'lobby',spyCount,currentPlayerIndex:0,secretItem:'',players:[{name,done:false}],roles:[]};
    myBinId=await createBin(gameData);
    myPlayerIndex=0;
    document.getElementById('lobby-code-display').textContent=myBinId;
    renderLobbyPlayers(gameData.players);
    showScreen('screen-lobby');
    startPolling(pollLobbyHost);
  }catch(e){
    document.getElementById('create-error').textContent='حصل خطأ، حاول تاني';
    setBtn('create-btn',false);
  }
}

// ===== JOIN =====
async function joinGame(){
  const name=document.getElementById('join-name').value.trim();
  const code=document.getElementById('join-code').value.trim();
  if(!name){document.getElementById('join-error').textContent='اكتب اسمك';return;}
  if(!code){document.getElementById('join-error').textContent='الصق الكود';return;}
  setBtn('join-btn',true);
  document.getElementById('join-error').textContent='';
  try{
    const game=await readBin(code);
    if(game.status!=='lobby'){document.getElementById('join-error').textContent='اللعبة بدأت بالفعل';setBtn('join-btn',false);return;}
    myBinId=code;isHost=false;myName=name;
    game.players.push({name,done:false});
    myPlayerIndex=game.players.length-1;
    await updateBin(myBinId,game);
    renderLobbyPlayersGuest(game.players);
    showScreen('screen-lobby-guest');
    startPolling(pollLobbyGuest);
  }catch(e){
    document.getElementById('join-error').textContent='الكود غلط أو اللعبة مش موجودة';
    setBtn('join-btn',false);
  }
}

// ===== RENDER =====
function renderLobbyPlayers(players){
  const c=document.getElementById('lobby-players');c.innerHTML='';
  players.forEach((p,i)=>{const d=document.createElement('div');d.className='player-item';d.innerHTML=`<div class="player-dot ${i===0?'host':''}"></div><span style="font-weight:600">${p.name}</span>${i===0?'<span style="font-size:0.75rem;color:var(--stone-400);margin-right:auto">هوست</span>':''}`;c.appendChild(d);});
}
function renderLobbyPlayersGuest(players){
  const c=document.getElementById('lobby-players-guest');c.innerHTML='';
  players.forEach((p,i)=>{const d=document.createElement('div');d.className='player-item';d.innerHTML=`<div class="player-dot ${i===0?'host':''}"></div><span style="font-weight:600">${p.name}</span>${i===0?'<span style="font-size:0.75rem;color:var(--stone-400);margin-right:auto">هوست</span>':''}`;c.appendChild(d);});
}

// ===== POLLING =====
function startPolling(fn){stopPolling();fn();pollInterval=setInterval(fn,2500);}
function stopPolling(){if(pollInterval){clearInterval(pollInterval);pollInterval=null;}}
async function pollLobbyHost(){try{const g=await readBin(myBinId);renderLobbyPlayers(g.players);}catch(e){}}
async function pollLobbyGuest(){try{const g=await readBin(myBinId);renderLobbyPlayersGuest(g.players);if(g.status==='playing'){stopPolling();enterGame(g);}}catch(e){}}

// ===== CATEGORIES =====
function showCategories(){
  stopPolling();
  const grid=document.getElementById('categories-grid');grid.innerHTML='';
  Object.keys(CATEGORIES).forEach(cat=>{const b=document.createElement('button');b.className='cat-btn';b.textContent=cat;b.onclick=()=>hostStartGame(cat);grid.appendChild(b);});
  showScreen('screen-categories');
}
async function hostStartGame(category){
  try{
    const game=await readBin(myBinId);
    const players=game.players;
    const secretItem=CATEGORIES[category][Math.floor(Math.random()*CATEGORIES[category].length)];
    const indices=shuffle([...Array(players.length).keys()]);
    const spySet=new Set(indices.slice(0,Math.min(spyCount,players.length-1)));
    const spyNames=[...spySet].map(i=>players[i].name);
    const roles=players.map((p,i)=>{if(spySet.has(i)){return{isSpy:true,otherSpies:spyNames.filter(n=>n!==p.name)};}return{isSpy:false};});
    game.secretItem=secretItem;game.roles=roles;game.status='playing';
    game.currentPlayerIndex=0;game.players=players.map(p=>({...p,done:false}));
    await updateBin(myBinId,game);
    showHostNextScreen(game);
  }catch(e){alert('حصل خطأ، حاول تاني');}
}

// ===== GAME FLOW =====
function enterGame(game){
  if(game.status==='finished'){stopPolling();showEndScreen(game);return;}
  if(game.currentPlayerIndex===myPlayerIndex){stopPolling();showMyTurn(game);}
  else{showWaitingTurn(game);startPolling(pollGameGuest);}
}
function showWaitingTurn(game){
  document.getElementById('waiting-my-name').textContent=myName;
  document.getElementById('waiting-msg').textContent=`دور ${game.players[game.currentPlayerIndex].name} دلوقتي...`;
  document.getElementById('waiting-icon').textContent='😴';
  renderDots('waiting-dots',game.players.length,game.currentPlayerIndex);
  showScreen('screen-waiting-turn');
}
function showMyTurn(game){
  cardFlipped=false;
  document.getElementById('myturn-name').textContent=myName;
  document.getElementById('done-btn').style.display='none';
  document.getElementById('flip-card').classList.remove('flipped');
  renderDots('myturn-dots',game.players.length,myPlayerIndex);
  const back=document.getElementById('flip-back');
  const role=game.roles[myPlayerIndex];
  if(role.isSpy){
    back.className='flip-face flip-back spy-back';
    const extra=role.otherSpies&&role.otherSpies.length>0?`<div class="card-spy-note">الجاسوس التاني: ${role.otherSpies.join('، ')}</div>`:'';
    back.innerHTML=`<div class="card-icon">🕵️</div><div class="card-role-label">دورك</div><div class="card-role-name font-katibeh">جاسوس!</div><div class="card-spy-note">مفيش كلمة سرية عندك...<br>حاول تعرفها من الكلام</div>${extra}`;
  }else{
    back.className='flip-face flip-back normal-back';
    back.innerHTML=`<div class="card-icon">🔐</div><div class="card-role-label">الكلمة السرية</div><div class="card-role-name font-katibeh">${game.secretItem}</div><div class="card-spy-note" style="opacity:0.6">اكتشف الجاسوس!</div>`;
  }
  showScreen('screen-my-turn');
}
function flipCard(){if(cardFlipped)return;cardFlipped=true;document.getElementById('flip-card').classList.add('flipped');setTimeout(()=>document.getElementById('done-btn').style.display='inline-block',600);}
async function iAmDone(){
  const back=document.getElementById('flip-back');
  back.style.visibility='hidden';
  document.getElementById('flip-card').classList.remove('flipped');
  document.getElementById('done-btn').style.display='none';
  setTimeout(()=>back.style.visibility='visible',650);
  try{
    const game=await readBin(myBinId);
    game.players[myPlayerIndex].done=true;
    await updateBin(myBinId,game);
    document.getElementById('waiting-my-name').textContent=myName;
    document.getElementById('waiting-msg').textContent='خلاص ✅ استنى الهوست يكمّل...';
    document.getElementById('waiting-icon').textContent='✅';
    renderDots('waiting-dots',game.players.length,game.currentPlayerIndex);
    showScreen('screen-waiting-turn');
    startPolling(pollGameGuest);
  }catch(e){}
}

// ===== HOST FLOW =====
function showHostNextScreen(game){
  const idx=game.currentPlayerIndex,total=game.players.length;
  document.getElementById('host-next-msg').textContent=`دلوقتي دور: ${game.players[idx].name} (${idx+1} / ${total})`;
  renderDots('host-dots',total,idx);
  showScreen('screen-host-next');
}
async function hostNext(){
  try{
    const game=await readBin(myBinId);
    const curIdx=game.currentPlayerIndex,total=game.players.length;
    if(curIdx+1>=total){game.status='finished';await updateBin(myBinId,game);showEndScreen(game);}
    else{game.currentPlayerIndex=curIdx+1;await updateBin(myBinId,game);showHostNextScreen(game);}
  }catch(e){alert('حصل خطأ');}
}
async function pollGameGuest(){
  try{
    const game=await readBin(myBinId);
    if(game.status==='finished'){stopPolling();showEndScreen(game);return;}
    if(game.currentPlayerIndex===myPlayerIndex){stopPolling();showMyTurn(game);}
    else showWaitingTurn(game);
  }catch(e){}
}

// ===== END =====
function showEndScreen(game){
  document.getElementById('end-secret').textContent=game.secretItem;
  const list=document.getElementById('end-roles');list.innerHTML='';
  game.roles.forEach((role,i)=>{
    const item=document.createElement('div');item.className='role-item '+(role.isSpy?'spy':'normal');
    item.style.animationDelay=(i*0.08)+'s';
    item.innerHTML=`<span class="role-name-left">${game.players[i].name}</span><span class="role-badge font-katibeh">${role.isSpy?'🕵️ جاسوس':'✅ عادي'}</span>`;
    list.appendChild(item);
  });
  showScreen('screen-end');
}
function renderDots(id,total,current){
  const el=document.getElementById(id);el.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='dot'+(i<current?' done':i===current?' current':'');el.appendChild(d);}
}

// ===== CLEANUP =====
async function deleteGameAndGoHome(){stopPolling();if(myBinId){try{await deleteBin(myBinId);}catch(e){}myBinId=null;}goHome();}
async function leaveAndGoHome(){
  stopPolling();
  if(myBinId&&!isHost){try{const g=await readBin(myBinId);g.players.splice(myPlayerIndex,1);await updateBin(myBinId,g);}catch(e){}}
  goHome();
}
async function playAgain(){
  if(isHost){
    try{
      const g=await readBin(myBinId);
      g.status='lobby';g.roles=[];g.secretItem='';g.currentPlayerIndex=0;
      g.players=g.players.map(p=>({...p,done:false}));
      await updateBin(myBinId,g);
      document.getElementById('lobby-code-display').textContent=myBinId;
      renderLobbyPlayers(g.players);
      showScreen('screen-lobby');
      startPolling(pollLobbyHost);
    }catch(e){goHome();}
  }else goHome();
}
</script>
